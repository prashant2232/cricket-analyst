server {
    listen 80;

    # Serve React static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Required for React Router — always serve index.html
        # so /player/virat-kohli doesn't return 404 on refresh
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to FastAPI backend container
    # "backend" is the service name in docker-compose.prod.yml
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for FastAPI to know the real protocol
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long AI generation requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}