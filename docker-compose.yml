services:

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: cricket-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - cricket-network

  # ── React Frontend ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: cricket-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - cricket-network

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cricket-redis
    ports:
      - "6379:6379"
    networks:
      - cricket-network

networks:
  cricket-network:
    driver: bridge